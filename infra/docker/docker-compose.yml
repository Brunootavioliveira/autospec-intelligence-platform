version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: autospec-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autospec-redis
    restart: always
    ports:
      - "6379:6379"

  ai-service:
    build: ../ai-service
    container_name: autospec-ai
    ports:
      - "5000:5000"
    env_file:
      - ../ai-service/.env
    depends_on:
      - postgres

  backend:
    build: ../backend/autospec-api
    container_name: autospec-backend
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - ai-service
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

volumes:
  postgres_data: