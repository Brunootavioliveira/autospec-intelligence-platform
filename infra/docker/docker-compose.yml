services:
  postgres:
    image: postgres:15
    container_name: autospec-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autospec-redis
    restart: always
    ports:
      - "6379:6379"

  ai-service:
    build: ../../ai-service
    container_name: autospec-ai
    ports:
      - "5000:5000"
    env_file:
      - ../../ai-service/.env
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: autospec-nginx

    ports:
      - "8443:443"
      - "8088:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs

    depends_on:
      - backend

  backend:
    build: ../../backend/autospec-api
    container_name: autospec-backend
    depends_on:
      - postgres
      - ai-service
      - redis
    env_file:
      - .env
    environment:
      DB_CRYPTO_KEY: ${DB_CRYPTO_KEY}
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      HMAC_SECRET: ${HMAC_SECRET}

volumes:
  postgres_data: