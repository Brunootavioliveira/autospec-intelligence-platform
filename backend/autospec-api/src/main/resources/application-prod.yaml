spring:
  config:
    import: optional:file:.env.properties

  application:
    name: backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    
  data:
    web:
      pageable:
        max-page-size: 10

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size: 1MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

server:
  port: 8080

  tomcat:
    max-http-form-post-size: 1MB

app:
  security:
    crypto-key: ${DB_CRYPTO_KEY}
    hmac-secret: ${HMAC_SECRET}
  retention:
    specs-months: 6
    history-months: 12
    sessions-days: 30